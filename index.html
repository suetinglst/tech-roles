<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Curated Tokyo tech roles by ST, Senior Talent Manager at Robert Half Japan.">
<title>Open Roles — Tokyo Tech</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--white:#fff;--border:#e5e3de;--border2:#c8c5bf;
  --text:#1a1a1a;--muted:#666;--muted2:#aaa;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
  --green:#059669;--green-bg:#ecfdf5;--green-border:#a7f3d0;
  --amber:#b45309;--amber-bg:#fffbeb;
  --violet:#7c3aed;--violet-bg:#f5f3ff;
  --tag-bg:#f0ede8;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;font-size:14px}

/* ── Top notification bar ── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:7px 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.topbar-btns{display:flex;gap:6px}
.tb{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s;white-space:nowrap}
.tb.discord{background:#5865F2;color:#fff}
.tb.line{background:#06C755;color:#fff}
.tb.book{background:var(--text);color:#fff}
.tb:hover{opacity:.85}

/* ── Header ── */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:1.5rem 2rem 1.25rem}
.hdr-inner{max-width:1100px;margin:0 auto}
.hdr h1{font-family:"Space Grotesk",sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;letter-spacing:-.4px;margin-bottom:3px}
.hdr-sub{font-size:12px;color:var(--muted);margin-bottom:1.25rem}
.hdr-stats{display:flex;gap:2rem;flex-wrap:wrap}
.snum{font-family:"Space Grotesk",sans-serif;font-size:20px;font-weight:700}
.slbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── Controls ── */
.ctrl-wrap{max-width:1100px;margin:0 auto;padding:1rem 2rem .5rem}
.ctrl-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:.75rem}
.vtog{display:flex;gap:3px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:3px}
.vbtn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:5px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:"Inter",sans-serif;transition:all .15s}
.vbtn.on{background:var(--text);color:#fff}
.rcount{font-size:12px;color:var(--muted)}
.swrap{position:relative;margin-bottom:.6rem}
.sinp{width:100%;padding:9px 14px 9px 36px;background:var(--white);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:"Inter",sans-serif;outline:none;transition:border-color .15s}
.sinp:focus{border-color:var(--accent)}
.sinp::placeholder{color:var(--muted2)}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13px;pointer-events:none}
.frow{display:flex;gap:4px;margin-bottom:4px;align-items:center;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.frow::-webkit-scrollbar{display:none}
.flbl{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted2);margin-right:2px;flex-shrink:0}
.fc{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:"Inter",sans-serif;flex-shrink:0}
.fc:hover{border-color:var(--border2);color:var(--text)}
.fc.on{background:var(--text);border-color:var(--text);color:#fff}

/* ── Grid ── */
.grid-wrap{max-width:1100px;margin:0 auto;padding:0 2rem 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* ── Role card ── */
.rcard{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;position:relative}
.rcard:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.07);transform:translateY(-1px)}
.rcard.saved{border-color:var(--accent-border);background:var(--accent-bg)}
.save-btn{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted2);transition:all .15s;padding:2px}
.save-btn:hover{color:var(--accent);transform:scale(1.15)}
.save-btn.saved{color:var(--accent)}
.rc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;padding-right:24px}
.rc-ini{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:14px;flex-shrink:0}
.rc-co{font-size:11px;color:var(--muted);margin-bottom:2px}
.rc-role{font-weight:600;font-size:13px;line-height:1.3;color:var(--text)}
.rc-sal{font-size:12px;font-weight:600;color:var(--green);margin-top:2px}
.rc-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.rc-work{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:4px}
.pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.pill-en{background:var(--green-bg);color:var(--green)}
.pill-ja{background:var(--amber-bg);color:var(--amber)}
.pill-rm{background:var(--violet-bg);color:var(--violet)}
.pill-type{background:var(--tag-bg);color:#555}

/* ── Company card ── */
.ccard{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s}
.ccard:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.07);transform:translateY(-1px)}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cc-ini{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px;flex-shrink:0}
.cc-name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px}
.cc-badge{font-size:10px;color:var(--muted);margin-top:1px}
.cc-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cc-bottom{font-size:11px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.cc-count{font-weight:600;color:var(--accent)}

/* ── Detail page ── */
.detail{max-width:860px;margin:0 auto;padding:1.5rem 2rem 4rem}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:7px;padding:6px 14px;cursor:pointer;margin-bottom:1.25rem;transition:all .15s;font-family:"Inter",sans-serif}
.back-btn:hover{color:var(--text);border-color:var(--border2);background:var(--bg)}
.detail-category{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.detail-hero{display:flex;align-items:flex-start;gap:14px;margin-bottom:1rem}
.detail-ini{width:52px;height:52px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:21px;flex-shrink:0}
.detail-company{font-size:12px;color:var(--muted);margin-bottom:3px}
.detail-role{font-family:"Space Grotesk",sans-serif;font-size:clamp(1.15rem,2.5vw,1.5rem);font-weight:700;letter-spacing:-.3px;line-height:1.2}
.detail-salary{font-size:13px;font-weight:600;color:var(--green);margin-top:6px}
.detail-pills{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 1.5rem}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{font-size:13px;font-weight:500;padding:8px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:"Inter",sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom-color:var(--text);font-weight:600}

/* Tab content */
.tab-content{animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.info-box{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.info-box-label{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted2);font-weight:500;margin-bottom:4px}
.info-box-val{font-size:13px;color:var(--text);line-height:1.4}
.about-text{font-size:13px;color:#444;line-height:1.7;margin-bottom:1.25rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-card{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:14px}
.detail-card h4{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text);display:flex;align-items:center;gap:5px}
.detail-card ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.detail-card li{font-size:12px;color:#444;line-height:1.5;padding-left:12px;position:relative}
.detail-card li::before{content:"▸";position:absolute;left:0;color:var(--accent);font-size:10px;top:2px}

/* Stack grouped */
.stack-section{margin-bottom:1rem}
.stack-section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stack-pills{display:flex;flex-wrap:wrap;gap:5px}
.stack-pill{font-size:12px;padding:4px 10px;border-radius:5px;font-weight:500}
.stack-pill.lang{background:#eff6ff;color:#1d4ed8}
.stack-pill.infra{background:#f5f3ff;color:#6d28d9}
.stack-pill.db{background:#ecfdf5;color:#065f46}
.stack-pill.other{background:var(--tag-bg);color:#555}

/* Grouped subroles */
.subroles-section{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:1.25rem}
.subroles-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.subrole-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.subrole-row:last-child{border-bottom:none}
.subrole-title{font-size:13px;font-weight:500}
.subrole-lang{font-size:11px;color:var(--muted);margin-top:2px}
.subrole-sal{font-size:13px;font-weight:600;color:var(--green);font-family:"Space Grotesk",sans-serif}

/* Other roles */
.other-roles{display:flex;flex-direction:column;gap:6px}
.other-role-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s}
.other-role-row:hover{border-color:var(--border2);background:var(--bg)}
.other-role-meta{font-size:11px;color:var(--muted);margin-top:2px}
.other-role-sal{font-size:13px;font-weight:600;color:var(--green);font-family:"Space Grotesk",sans-serif;white-space:nowrap}

/* CTA */
.detail-cta{display:flex;gap:8px;flex-wrap:wrap;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.cta-btn{font-size:13px;font-weight:600;padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--text);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:"Inter",sans-serif}
.cta-btn:hover{border-color:var(--border2);background:var(--bg)}
.cta-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.cta-btn.primary:hover{background:#333}
.cta-btn.interest{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
.cta-btn.interest:hover{background:#dbeafe}

/* Saved banner */
.saved-banner{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:6px}

/* Legend */
.legend{max-width:1100px;margin:0 auto 2rem;padding:0 2rem}
.legend-inner{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;flex-wrap:wrap;gap:12px 24px;font-size:12px;color:var(--muted)}
.legend-item{display:flex;align-items:center;gap:5px}

/* Form */
.fsec{max-width:640px;margin:0 auto 4rem;padding:0 2rem}
.fhd{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:600;margin-bottom:4px}
.fsub-txt{font-size:12px;color:var(--muted);margin-bottom:1.1rem}
.fbox{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:12px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:500}
.fg input,.fg textarea{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:8px 11px;font-family:"Inter",sans-serif;outline:none;transition:border-color .15s}
.fg input:focus,.fg textarea:focus{border-color:var(--accent);background:var(--white)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--muted2)}
.fg textarea{min-height:70px;resize:vertical}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:3px;max-height:180px;overflow-y:auto;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:7px}
.cchk{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;cursor:pointer;padding:3px 4px;border-radius:4px}
.cchk:hover{color:var(--text);background:#eeecea}
.cchk input{accent-color:var(--accent)}
.selrow{display:flex;gap:8px;margin-bottom:4px}
.selbtn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:"Inter",sans-serif}
.cvnote{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:10px 12px;font-size:12px;color:#1e40af;line-height:1.6}
.cvnote a{color:var(--accent);font-weight:500}
.subbtn{background:var(--text);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:"Inter",sans-serif;transition:background .15s;align-self:flex-start}
.subbtn:hover{background:#333}
.succbox{background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;padding:20px;text-align:center;color:var(--green)}
.succbox h3{font-size:15px;font-weight:600;margin-bottom:5px}
.succbox p{font-size:12px;opacity:.85}
.nores{text-align:center;padding:3rem;color:var(--muted);grid-column:1/-1;font-size:13px}
footer{text-align:center;padding:1.5rem 2rem;border-top:1px solid var(--border);color:var(--muted);font-size:11px;background:var(--white);margin-top:2rem}
footer a{color:var(--muted)}

@media(max-width:640px){
  .hdr{padding:1.25rem 1rem 1rem}
  .ctrl-wrap,.grid-wrap{padding-left:1rem;padding-right:1rem}
  .detail{padding:1rem 1rem 3rem}
  .two-col,.info-grid,.frow2{grid-template-columns:1fr}
  .fsec{padding:0 1rem}
  .topbar{padding:7px 1rem}
  .topbar-left span:last-child{display:none}
  .legend{padding:0 1rem}
}
</style>
</head>

<script>const COMPANIES = [{"name": "Cybereason", "badge": "EDR / XDR", "category": "Startup", "desc": "Advanced endpoint security platform. New VP of R&D building next-gen platform from ground up. Targeting 8M endpoints. Full-Stack (Go/Rust/C++) and Data Infra openings.", "stack": "Go · Rust · C++ · Python · AWS · Kubernetes · Kafka · Elasticsearch", "stackGrouped": {"languages": ["Go", "Rust", "C++", "Python"], "infrastructure": ["AWS", "Kubernetes"], "databases": ["Kafka", "Elasticsearch"], "other": []}, "tags": ["Cybersecurity", "Enterprise", "Rust / Go", "🌏 English OK"], "dataTags": "startup english", "dataRoles": "devops swe", "workMode": "📍 Otemachi Building 2F, Chiyoda-ku", "roles": [{"title": "Full-Stack Engineer", "salary": "¥8–15M", "subroles": [], "scope": "Work across the full stack at Cybereason — from backend services to frontend interfaces — shipping features end-to-end as part of a small, high-ownership team.", "why": "Japan's R&D team isn't a satellite office — it's leading global development of Cybereason's new XDR and SDR products, working alongside SoftBank's $120M March 2025 investment. #1 market share in Japan since 2016. Visa sponsorship available, no Japanese required for R&D roles."}, {"title": "Data Infrastructure Engineer", "salary": "¥8–15M", "subroles": [], "scope": "Own the infrastructure and reliability of Cybereason's systems. You'll work on CI/CD, observability, incident response, and scaling the platform as the company grows — using Go.", "why": "Japan's R&D team isn't a satellite office — it's leading global development of Cybereason's new XDR and SDR products, working alongside SoftBank's $120M March 2025 investment. #1 market share in Japan since 2016. Visa sponsorship available, no Japanese required for R&D roles."}], "website": "https://www.cybereason.co.jp/", "careers": "https://boards.greenhouse.io/cybereason", "initial": "C", "remote": false, "lang": "en"}, {"name": "H2 Corporation", "badge": "Pre-Series A · NEA backed", "c   devops:['devops','sre','platform engineer','infrastructure','ops engineer','tpm'],
  data:['data engineer','data scientist','ml engineer','ai engineer','junior ai','mlops'],
};
const ROLE_LABELS = {swe:'SWE',data:'Data / AI',devops:'DevOps / Infra',sa:'Solution Architect',fde:'Forward Deployed',leadership:'Leadership'};
function getRoleType(t) {
  const tl=t.toLowerCase();
  for(const [type,keys] of Object.entries(ROLE_TYPES)) if(keys.some(k=>tl.includes(k))) return type;
  return 'swe';
}

function Pill({text,type}){ return <span className={`pill pill-${type}`}>{text}</span>; }
function LangPill({company}){
  const en=company.tags.some(t=>t.includes('🌏'));
  const ja=company.tags.some(t=>t.includes('🇯🇵'));
  if(en&&ja) return <Pill text="Some EN" type="en"/>;
  return en?<Pill text="English OK" type="en"/>:<Pill text="JP Required" type="ja"/>;
}

function StackSection({label,items,type}){
  if(!items||!items.length) return null;
  return(
    <div className="stack-section">
      <div className="stack-section-label">{label}</div>
      <div className="stack-pills">{items.map((s,i)=><span key={i} className={`stack-pill ${type}`}>{s}</span>)}</div>
    </div>
  );
}

function DetailPage({company,role,onBack,onSelectRole,onInterest,saved,onSave}){
  const [tab,setTab]=useState('overview');
  const col=gc(company.name);
  const rtype=getRoleType(role.title);
  const otherRoles=company.roles.filter(r=>r.title!==role.title);
  const sg=company.stackGrouped||{};
  const otherTabLabel=otherRoles.length>0?`${otherRoles.length} more at ${company.name}`:`Other Roles`;

  return(
    <div className="detail">
      <button className="back-btn" onClick={onBack}>← Back to role list</button>

      {saved&&<div className="saved-banner">⭐ You saved this role — it will be pre-selected in the form below.</div>}

      <div className="detail-category">{company.category}</div>

      <div className="detail-hero">
        <div className="detail-ini" style={{background:col+'18',color:col}}>{company.initial}</div>
        <div style={{flex:1}}>
          <div className="detail-company">{company.name}</div>
          <div className="detail-role">{role.title}</div>
          <div className="detail-salary">{role.salary}</div>
        </div>
        <button className={`save-btn ${saved?'saved':''}`} onClick={onSave} title={saved?'Saved':'Save role'}>
          {saved?'⭐':'☆'}
        </button>
      </div>

      <div className="detail-pills">
        <LangPill company={company}/>
        {company.remote&&<Pill text="Remote" type="rm"/>}
        <Pill text={ROLE_LABELS[rtype]||'SWE'} type="type"/>
      </div>

      <div className="tabs">
        {[['overview','Overview'],['stack','Tech Stack'],['roles',otherTabLabel]].map(([v,l])=>(
          <button key={v} className={`tab ${tab===v?'on':''}`} onClick={()=>setTab(v)}>{l}</button>
        ))}
      </div>

      {tab==='overview'&&(
        <div className="tab-content">
          <div className="info-grid">
            <div className="info-box">
              <div className="info-box-label">📍 Location & Work Style</div>
              <div className="info-box-val">{company.workMode}</div>
            </div>
            <div className="info-box">
              <div className="info-box-label">🌏 Language</div>
              <div className="info-box-val">{company.tags.filter(t=>t.includes('🌏')||t.includes('🇯🇵')).join(' · ')||'See careers page'}</div>
            </div>
          </div>

          {role.subroles&&role.subroles.length>0&&(
            <div className="subroles-section">
              <div className="subroles-label">Roles included in this group</div>
              {role.subroles.map((sr,i)=>(
                <div key={i} className="subrole-row">
                  <div>
                    <div className="subrole-title">{sr.title}</div>
                    {sr.lang&&<div className="subrole-lang">{sr.lang}</div>}
                  </div>
                  <div className="subrole-sal">{sr.salary}</div>
                </div>
              ))}
            </div>
          )}

          <div className="info-box" style={{marginBottom:'1.25rem'}}>
            <div className="info-box-label">🎯 What you'll do</div>
            <div className="info-box-val" style={{fontSize:13,lineHeight:1.65}}>{role.scope}</div>
          </div>

          <div className="info-box" style={{marginBottom:'1.25rem'}}>
            <div className="info-box-label">💡 Why this role</div>
            <div className="info-box-val" style={{fontSize:13,lineHeight:1.65}}>{role.why}</div>
          </div>

          <div className="detail-card">
            <h4>🏢 About {company.name}</h4>
            <p style={{fontSize:13,color:'#444',lineHeight:1.7}}>{company.desc}</p>
          </div>

          <div className="detail-card" style={{marginTop:10}}>
            <h4>✅ Working with ST</h4>
            <ul>
              <li>Free service for candidates — ST is paid by the hiring company</li>
              <li>Brief you on the role, team, and culture before you apply</li>
              <li>Coordinate your application directly with the hiring manager</li>
              <li>Support through interviews and offer negotiation</li>
            </ul>
          </div>
        </div>
      )}

      {tab==='stack'&&(
        <div className="tab-content">
          <StackSection label="Languages" items={sg.languages} type="lang"/>
          <StackSection label="Infrastructure & Cloud" items={sg.infrastructure} type="infra"/>
          <StackSection label="Databases & Data" items={sg.databases} type="db"/>
          <StackSection label="Other" items={sg.other} type="other"/>
          {!sg.languages&&!sg.infrastructure&&!sg.databases&&<p style={{fontSize:13,color:'var(--muted)'}}>See careers page for full tech stack details.</p>}
        </div>
      )}

      {tab==='roles'&&(
        <div className="tab-content">
          {otherRoles.length===0
            ?<p style={{fontSize:13,color:'var(--muted)'}}>No other open roles at {company.name} right now.</p>
            :<div className="other-roles">
              {otherRoles.map((r,i)=>(
                <div key={i} className="other-role-row" onClick={()=>onSelectRole(company,r)}>
                  <div>
                    <div style={{fontWeight:500,fontSize:13}}>{r.title}</div>
                    <div className="other-role-meta">{ROLE_LABELS[getRoleType(r.title)]||'SWE'} · {r.salary}</div>
                  </div>
                  <div className="other-role-sal">View →</div>
                </div>
              ))}
            </div>
          }
        </div>
      )}

      <div className="detail-cta">
        {company.careers&&<a href={company.careers} target="_blank" className="cta-btn primary">💼 View Careers Page →</a>}
        {company.website&&<a href={company.website} target="_blank" className="cta-btn">🌐 Website</a>}
        <button className="cta-btn interest" onClick={onInterest}>📩 Express Interest</button>
      </div>
    </div>
  );
}

function RoleCard({company,role,onOpen,saved,onSave}){
  const col=gc(company.name);
  const rtype=getRoleType(role.title);
  const workShort=company.workMode.replace(/📍\s*/,'').split('·')[0].trim();
  return(
    <div className={`rcard ${saved?'saved':''}`} onClick={()=>onOpen(company,role)}>
      <button className={`save-btn ${saved?'saved':''}`} onClick={e=>{e.stopPropagation();onSave(company.name+':'+role.title);}}>
        {saved?'⭐':'☆'}
      </button>
      <div className="rc-top">
        <div className="rc-ini" style={{background:col+'18',color:col}}>{company.initial}</div>
        <div style={{flex:1,minWidth:0}}>
          <div className="rc-co">{company.name}</div>
          <div className="rc-role">{role.title}</div>
          <div className="rc-sal">{role.salary}</div>
        </div>
      </div>
      <div className="rc-pills">
        <LangPill company={company}/>
        {company.remote&&<Pill text="Remote" type="rm"/>}
        <Pill text={ROLE_LABELS[rtype]||'SWE'} type="type"/>
      </div>
      {workShort&&<div className="rc-work">📍 {workShort}</div>}
    </div>
  );
}

function CompanyCard({company,onOpen}){
  const col=gc(company.name);
  const salaries=[...new Set(company.roles.map(r=>r.salary))].slice(0,2).join(' · ');
  return(
    <div className="ccard" onClick={()=>onOpen(company,null)}>
      <div className="cc-top">
        <div className="cc-ini" style={{background:col+'18',color:col}}>{company.initial}</div>
        <div>
          <div className="cc-name">{company.name}</div>
          <div className="cc-badge">{company.badge}</div>
        </div>
      </div>
      <div className="cc-desc">{company.desc}</div>
      <div className="rc-pills" style={{marginBottom:8}}>
        <LangPill company={company}/>
        {company.remote&&<Pill text="Remote" type="rm"/>}
      </div>
      <div className="cc-bottom">
        <span><span className="cc-count">{company.roles.length}</span> open role{company.roles.length!==1?'s':''}</span>
        <span style={{color:'var(--green)',fontFamily:'"Space Grotesk",sans-serif',fontWeight:600,fontSize:11}}>{salaries}</span>
      </div>
    </div>
  );
}

function Form({companies,defaultCompanies}){
  const [done,setDone]=useState(false);
  const [sel,setSel]=useState(defaultCompanies||[]);
  const tog=n=>setSel(s=>s.includes(n)?s.filter(x=>x!==n):[...s,n]);
  const sub=async(e)=>{
    e.preventDefault();
    const btn=e.target.querySelector('button[type=submit]');
    btn.textContent='Sending...';btn.disabled=true;
    const data=new FormData(e.target);
    sel.forEach(s=>data.append('companies',s));
    try{
      const r=await fetch('https://formspree.io/f/meedqzld',{method:'POST',body:data,headers:{Accept:'application/json'}});
      if(r.ok) setDone(true);
      else{btn.textContent='Send to ST →';btn.disabled=false;alert('Something went wrong. Email sueting.lim@roberthalf.jp');}
    }catch{btn.textContent='Send to ST →';btn.disabled=false;alert('Something went wrong.');}
  };
  if(done) return(
    <div className="fsec">
      <div className="succbox">
        <h3>✅ Received! Thank you.</h3>
        <p>ST will be in touch within 2 business days.<br/>Email your CV to <strong>sueting.lim@roberthalf.jp</strong> with subject <strong>"CV - [Your Name]"</strong></p>
      </div>
    </div>
  );
  return(
    <div className="fsec" id="interest-form">
      <h2 className="fhd">📩 Express Interest</h2>
      <p className="fsub-txt">Tell ST which companies interest you — she'll be in touch within 2 business days.</p>
      <form className="fbox" onSubmit={sub}>
        <div className="frow2">
          <div className="fg"><label>Full Name *</label><input name="name" placeholder="Your full name" required/></div>
          <div className="fg"><label>Email *</label><input type="email" name="email" placeholder="your@email.com" required/></div>
        </div>
        <div className="frow2">
          <div className="fg"><label>Phone / LINE ID</label><input name="phone" placeholder="+81 90-XXXX or LINE ID"/></div>
          <div className="fg"><label>Current Title</label><input name="title" placeholder="e.g. Senior Backend Engineer"/></div>
        </div>
        <div className="fg">
          <label>Companies I'm Interested In {sel.length>0?`(${sel.length} selected)`:''}</label>
          <div className="selrow">
            <button type="button" className="selbtn" onClick={()=>setSel(companies.map(c=>c.name))}>Select all</button>
            <button type="button" className="selbtn" onClick={()=>setSel([])}>Clear</button>
          </div>
          <div className="cgrid">
            {companies.map((c,i)=>(
              <label key={i} className="cchk">
                <input type="checkbox" checked={sel.includes(c.name)} onChange={()=>tog(c.name)}/>
                <span>{c.name}</span>
              </label>
            ))}
          </div>
        </div>
        <div className="fg"><label>Message (optional)</label><textarea name="message" placeholder="Roles you're most interested in, availability, years of experience..."/></div>
        <div className="cvnote">📎 After submitting, email your CV to <a href="mailto:sueting.lim@roberthalf.jp?subject=CV - [Your Name]">sueting.lim@roberthalf.jp</a> with subject <strong>"CV - [Your Name]"</strong></div>
        <button type="submit" className="subbtn">Send to ST →</button>
      </form>
    </div>
  );
}

function App(){
  const [view,setView]=useState('roles');
  const [q,setQ]=useState('');
  const [cf,setCf]=useState('all');
  const [rf,setRf]=useState('all');
  const [detail,setDetail]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [saved,setSaved]=useState([]);
  const [formCompanies,setFormCompanies]=useState([]);

  const toggleSave=(key)=>{
    setSaved(s=>s.includes(key)?s.filter(x=>x!==key):[...s,key]);
  };
  const isSaved=(company,role)=>saved.includes(company.name+':'+role.title);

  const allRoles=useMemo(()=>{
    const list=[];
    COMPANIES.forEach(c=>c.roles.forEach(r=>list.push({company:c,role:r,rtype:getRoleType(r.title)})));
    return list;
  },[]);

  const filteredRoles=useMemo(()=>allRoles.filter(({company:c,role:r,rtype})=>{
    const cm=cf==='all'||c.dataTags.includes(cf);
    const rm=rf==='all'||rtype===rf||c.dataRoles.includes(rf);
    const lq=q.toLowerCase();
    const sm=!lq||[c.name,r.title,r.salary,c.stack,...c.tags].some(x=>x.toLowerCase().includes(lq));
    return cm&&rm&&sm;
  }),[q,cf,rf,allRoles]);

  const filteredCompanies=useMemo(()=>COMPANIES.filter(c=>{
    const cm=cf==='all'||c.dataTags.includes(cf);
    const rm=rf==='all'||c.dataRoles.includes(rf);
    const lq=q.toLowerCase();
    const sm=!lq||[c.name,c.desc,c.stack,...c.tags,...c.roles.map(r=>r.title)].some(x=>x.toLowerCase().includes(lq));
    return cm&&rm&&sm;
  }),[q,cf,rf]);

  const openDetail=(company,role)=>{
    setDetail({company,role:role||company.roles[0]});
    setShowForm(false);
    window.scrollTo({top:0,behavior:'smooth'});
  };
  const goBack=()=>{setDetail(null);setShowForm(false);};
  const openInterest=(companyName)=>{
    setDetail(null);
    setShowForm(true);
    setFormCompanies(companyName?[companyName]:saved.map(s=>s.split(':')[0]));
    setTimeout(()=>{
      const el=document.getElementById('interest-form');
      if(el) el.scrollIntoView({behavior:'smooth'});
    },100);
  };

  const total=COMPANIES.reduce((a,c)=>a+c.roles.length,0);
  const CFS=[['all','All'],['startup','Startup'],['public','TSE Listed'],['unicorn','Unicorn'],['remote','Remote'],['english','English OK'],['fintech','FinTech'],['ai','AI / ML']];
  const RFS=[['all','All'],['swe','SWE'],['data','Data / AI'],['devops','DevOps'],['sa','SA'],['fde','FDE'],['leadership','Leadership']];
  const count=view==='roles'?filteredRoles.length:filteredCompanies.length;

  return(<>
    <div className="topbar">
      <div className="topbar-left">
        <span>🔔</span>
        <span><strong>Get notified when new roles are added</strong> — join ST's channels or book a call.</span>
      </div>
      <div className="topbar-btns">
        <a href="https://discord.gg/CczMnP27a2" target="_blank" className="tb discord">💬 Discord</a>
        <a href="https://lin.ee/5vPKhlJ" target="_blank" className="tb line">📲 LINE</a>
        <a href="https://calendly.com/sueting-lim" target="_blank" className="tb book">📅 Book ST</a>
      </div>
    </div>

    <div className="hdr">
      <div className="hdr-inner">
        <h1>Open Roles — Tokyo Tech</h1>
        <div className="hdr-sub">Curated by Sue Ting Lim · Senior Talent Manager · Robert Half Japan</div>
        <div className="hdr-stats">
          <div><div className="snum">{COMPANIES.length}</div><div className="slbl">Companies</div></div>
          <div><div className="snum">{total}</div><div className="slbl">Open Roles</div></div>
          {saved.length>0&&<div><div className="snum" style={{color:'var(--accent)'}}>{saved.length}</div><div className="slbl">Saved</div></div>}
        </div>
      </div>
    </div>

    {detail&&!showForm&&(
      <DetailPage
        company={detail.company}
        role={detail.role}
        onBack={goBack}
        onSelectRole={(c,r)=>{setDetail({company:c,role:r});window.scrollTo({top:0,behavior:'smooth'});}}
        onInterest={()=>openInterest(detail.company.name)}
        saved={isSaved(detail.company,detail.role)}
        onSave={()=>toggleSave(detail.company.name+':'+detail.role.title)}
      />
    )}

    {!detail&&(<>
      <div className="ctrl-wrap">
        <div className="ctrl-top">
          <div className="vtog">
            <button className={`vbtn ${view==='roles'?'on':''}`} onClick={()=>setView('roles')}>💼 By Role</button>
            <button className={`vbtn ${view==='companies'?'on':''}`} onClick={()=>setView('companies')}>🏢 By Company</button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {saved.length>0&&<button onClick={()=>openInterest(null)} style={{fontSize:12,color:'var(--accent)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',fontFamily:'"Inter",sans-serif'}}>📩 Submit {saved.length} saved role{saved.length!==1?'s':''}</button>}
            <span className="rcount">{count} {view==='roles'?`role${count!==1?'s':''}`:` compan${count!==1?'ies':'y'}`} shown</span>
          </div>
        </div>
        <div className="swrap">
          <span className="sico">🔍</span>
          <input className="sinp" placeholder="Search role, company, stack... (e.g. Go, FDE, Mercari)" value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div className="frow">
          <span className="flbl">Type</span>
          {CFS.map(([v,l])=><button key={v} className={`fc ${cf===v?'on':''}`} onClick={()=>setCf(v)}>{l}</button>)}
        </div>
        <div className="frow">
          <span className="flbl">Role</span>
          {RFS.map(([v,l])=><button key={v} className={`fc ${rf===v?'on':''}`} onClick={()=>setRf(v)}>{l}</button>)}
        </div>
      </div>

      <div className="grid-wrap">
        <div className="grid">
          {view==='roles'
            ?(filteredRoles.length===0
              ?<div className="nores">No roles match. Try different keywords.</div>
              :filteredRoles.map(({company,role},i)=>(
                <RoleCard key={i} company={company} role={role} onOpen={openDetail}
                  saved={isSaved(company,role)} onSave={()=>toggleSave(company.name+':'+role.title)}/>
              )))
            :(filteredCompanies.length===0
              ?<div className="nores">No companies match. Try different keywords.</div>
              :filteredCompanies.map((c,i)=><CompanyCard key={i} company={c} onOpen={openDetail}/>))
          }
        </div>
      </div>

      <div className="legend">
        <div className="legend-inner">
          <div className="legend-item"><Pill text="English OK" type="en"/> English speakers welcome, Japanese not required</div>
          <div className="legend-item"><Pill text="JP Required" type="ja"/> Japanese language needed for this role</div>
          <div className="legend-item"><Pill text="Remote" type="rm"/> Fully remote or remote-friendly</div>
          <div className="legend-item"><Pill text="SWE" type="type"/> Role type category</div>
        </div>
      </div>
    </>)}

    <Form companies={COMPANIES} defaultCompanies={showForm?formCompanies:[]}/>

    <footer>
      Curated by <strong>Sue Ting Lim (ST)</strong> · Senior Talent Manager, Technology · Robert Half Japan ·&nbsp;
      <a href="tel:+81345711430">+81 (3) 4571-1430</a> ·&nbsp;
      <a href="mailto:sueting.lim@roberthalf.jp">sueting.lim@roberthalf.jp</a>
    </footer>
  </>);
}
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
